<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a00"/>
      <stop offset="100%" style="stop-color:#1a0050"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Stars -->
  <text x="80" y="160" font-size="44">⭐</text>
  <text x="660" y="160" font-size="44">⭐</text>
  <text x="365" y="90" font-size="54">🏆</text>
  <!-- Main hanzi -->
  <text x="400" y="220" font-family="Noto Serif SC, serif" font-size="64" font-weight="700" fill="#ffd700" text-anchor="middle">恭喜！</text>
  <!-- Pinyin -->
  <text x="400" y="268" font-family="Noto Serif SC, serif" font-size="22" fill="#ffe066" text-anchor="middle" opacity="0.85">Gōng xǐ！</text>
  <!-- Subtext hanzi -->
  <text x="400" y="330" font-family="Noto Serif SC, serif" font-size="26" fill="#ccffcc" text-anchor="middle">繼續學習！</text>
  <text x="400" y="365" font-family="Noto Serif SC, serif" font-size="16" fill="#99ddaa" text-anchor="middle">Jìxù xuéxí！</text>
</svg>
