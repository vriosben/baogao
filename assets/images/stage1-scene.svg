<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="350" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="500" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="650" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="750" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="100" fill="#5c4a00"/>
  <!-- Blocks platform -->
  <rect x="50" y="280" width="60" height="60" rx="4" fill="#e6a817" stroke="#c8830a" stroke-width="3"/>
  <rect x="110" y="280" width="60" height="60" rx="4" fill="#e6a817" stroke="#c8830a" stroke-width="3"/>
  <rect x="170" y="280" width="60" height="60" rx="4" fill="#e6a817" stroke="#c8830a" stroke-width="3"/>
  <!-- Question block -->
  <rect x="300" y="220" width="60" height="60" rx="4" fill="#e6a817" stroke="#c8830a" stroke-width="3"/>
  <text x="330" y="258" font-family="serif" font-size="30" font-weight="bold" fill="#c8830a" text-anchor="middle">?</text>
  <!-- Pipes -->
  <rect x="600" y="280" width="50" height="70" fill="#00a800"/>
  <rect x="590" y="270" width="70" height="20" rx="3" fill="#00cc00"/>
  <!-- Castle far -->
  <rect x="680" y="200" width="100" height="150" fill="#888"/>
  <rect x="660" y="190" width="20" height="40" fill="#888"/>
  <rect x="780" y="190" width="20" height="40" fill="#888"/>
  <rect x="720" y="170" width="20" height="40" fill="#888"/>
  <rect x="690" y="250" width="40" height="100" fill="#555"/>
  <!-- Text overlay area -->
  <rect x="0" y="380" width="800" height="70" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="410" font-family="serif" font-size="14" fill="#ffd700" text-anchor="middle" opacity="0.5">[ ESCENA 1 - Edita este SVG ]</text>
</svg>