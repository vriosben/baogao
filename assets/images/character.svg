<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Round face character — edit colors/features as needed -->
  <!-- Face circle -->
  <circle cx="20" cy="20" r="18" fill="#f5c07a" stroke="#c8904a" stroke-width="2"/>
  <!-- Hat / hair top — khaki like the reference -->
  <ellipse cx="20" cy="6" rx="16" ry="8" fill="#8b7a4a"/>
  <rect x="4" y="4" width="32" height="10" rx="5" fill="#8b7a4a"/>
  <!-- Hat peak -->
  <polygon points="16,10 24,10 22,16 18,16" fill="#7a6a3a"/>
  <!-- Eyes -->
  <circle cx="13" cy="20" r="3" fill="#333"/>
  <circle cx="27" cy="20" r="3" fill="#333"/>
  <!-- Eye shine -->
  <circle cx="14" cy="19" r="1" fill="white"/>
  <circle cx="28" cy="19" r="1" fill="white"/>
  <!-- Cheeks -->
  <ellipse cx="9" cy="25" rx="4" ry="3" fill="#f0a090" opacity="0.6"/>
  <ellipse cx="31" cy="25" rx="4" ry="3" fill="#f0a090" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M 14 27 Q 20 32 26 27" stroke="#a05030" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
