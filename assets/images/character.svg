<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" width="70" height="90">
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <!-- Filtro de borde blanco grueso -->
    <filter id="outline" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feFlood flood-color="#ffffff" flood-opacity="1" result="color"/>
      <feComposite in="color" in2="expanded" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sombra debajo -->
    <filter id="shadow-drop" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Sombra en el suelo -->
  <ellipse cx="36" cy="86" rx="18" ry="5" fill="url(#shadow)"/>

  <!-- Todo el personaje con borde blanco y sombra -->
  <g filter="url(#outline)">
  <g filter="url(#shadow-drop)">

    <!-- PIERNAS -->
    <!-- Pierna izquierda (atrás) -->
    <path d="M26 58 Q20 68 18 78 Q21 81 25 80 Q29 68 31 59Z" fill="#5c3010"/>
    <!-- Bota izquierda -->
    <ellipse cx="20" cy="79" rx="7" ry="4.5" fill="#3a1e08" transform="rotate(-12,20,79)"/>

    <!-- Pierna derecha (adelante) -->
    <path d="M36 58 Q42 68 45 76 Q42 80 38 79 Q34 68 32 59Z" fill="#6b3a14"/>
    <!-- Bota derecha -->
    <ellipse cx="43" cy="77" rx="7.5" ry="4.5" fill="#3a1e08" transform="rotate(10,43,77)"/>

    <!-- CUERPO -->
    <path d="M20 33 Q16 45 17 60 Q23 64 34 64 Q45 64 47 60 Q48 45 44 33 Q39 29 33 29 Q26 29 20 33Z"
          fill="#3a8c28"/>
    <!-- Pliegue de sombra -->
    <path d="M25 33 Q22 45 23 58 Q27 61 30 61 Q28 46 28 33Z" fill="#2d6e1e" opacity="0.45"/>
    <!-- Cinturón -->
    <rect x="19" y="48" width="29" height="5" rx="2.5" fill="#7a4a10"/>
    <rect x="30" y="46.5" width="8" height="8" rx="1.5" fill="#c08820"/>

    <!-- BRAZO izquierdo -->
    <path d="M20 35 Q11 38 9 48 Q12 51 16 50 Q17 41 22 37Z" fill="#3a8c28"/>
    <circle cx="9" cy="49" r="5.5" fill="#f0c890"/>

    <!-- BRAZO derecho -->
    <path d="M44 35 Q53 40 55 50 Q52 53 48 52 Q47 43 42 38Z" fill="#3a8c28"/>
    <circle cx="55" cy="51" r="5.5" fill="#f0c890"/>

    <!-- CUELLO / camisa blanca -->
    <path d="M26 31 Q34 27 42 31 Q40 35 34 36 Q27 35 26 31Z" fill="#f5f5f0"/>

    <!-- CABEZA -->
    <ellipse cx="34" cy="22" rx="15" ry="14" fill="#f0c890"/>
    <!-- Mejillas -->
    <ellipse cx="23" cy="25" rx="4.5" ry="3" fill="#e8a880" opacity="0.45"/>
    <ellipse cx="45" cy="25" rx="4.5" ry="3" fill="#e8a880" opacity="0.45"/>

    <!-- CARA -->
    <!-- Cejas serias -->
    <path d="M26 17 Q29 14 32 17" stroke="#5c3010" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M36 17 Q39 14 43 17" stroke="#5c3010" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ojos -->
    <ellipse cx="29" cy="21" rx="3.2" ry="3.5" fill="#1e1008"/>
    <ellipse cx="40" cy="21" rx="3.2" ry="3.5" fill="#1e1008"/>
    <!-- Brillos -->
    <circle cx="30.5" cy="19.5" r="1.2" fill="white"/>
    <circle cx="41.5" cy="19.5" r="1.2" fill="white"/>
    <!-- Nariz -->
    <ellipse cx="34" cy="25" rx="2.5" ry="1.8" fill="#d4956a"/>
    <!-- Boca -->
    <path d="M28 29 Q34 32 40 29" stroke="#8b4513" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Cabello café -->
    <path d="M21 19 Q23 10 34 8 Q45 10 47 19 Q42 14 34 14 Q26 14 21 19Z" fill="#8b5a2b"/>
    <!-- Mechón frontal -->
    <path d="M23 18 Q25 13 30 14 Q27 15 25 19Z" fill="#7a4a20"/>

    <!-- GORRO verde puntiagudo -->
    <path d="M19 18 Q22 4 34 1 Q46 4 49 18 Q44 13 34 12 Q24 13 19 18Z" fill="#2d7a1e"/>
    <!-- Borde inferior del gorro -->
    <path d="M17 18 Q19 22 34 22 Q49 22 51 18 Q48 15 34 15 Q20 15 17 18Z" fill="#3a9028"/>
    <!-- Línea de sombra en gorro -->
    <path d="M24 15 Q28 8 34 5 Q30 9 27 15Z" fill="#1e5a14" opacity="0.4"/>

  </g>
  </g>
</svg>
